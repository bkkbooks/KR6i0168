body:
  text: 東晉天竺三藏竺曇無蘭譯聞如是一時佛在舍衛國祇陀恆呵雕阿那鋡將五百優婆塞至舍利弗所作禮已却坐舍利弗為說經大歡喜而退復至佛所以頭面著地叉手繞佛三匝却坐佛問呵雕阿那鋡若有何功德教化五百弟子隨從汝呵雕阿那鋡即長跪叉手言我常奉行佛所說四事何等為四一者布施於人二者說善說三者瞻視同學給足有無四者同學者財共不計佛言善哉善哉已過去佛無有過是四事未來佛亦無有過是四事今現在佛亦無有過是四事佛為呵雕阿那鋡說經已各大歡喜而退呵雕阿那鋡還歸入舍呼諸人客奴婢坐著前好為說經開解語生死善惡之道復上殿呼諸持藏人諸妓女著前為說經戒皆大歡喜復上後殿為諸夫人婦女說經戒已訖還至正殿齊戒床上端坐定意便得等心第一天上四王請諸天皆會坐共稱譽呵雕阿那鋡功德四天王中尊王下至呵雕阿那鋡舍面稱譽呵雕阿那鋡功德呵雕阿那鋡時得等心不答天王佛邊有一比丘至呵雕阿那鋡舍呵雕阿那鋡起迎比丘前坐比丘說言佛坐中常相稱譽功德呵雕阿那鋡問比丘言佛稱譽我時邊有白衣無比丘言無有白衣正使有白衣有何等嫌疑耶呵雕阿那鋡言佛語至誠恐白衣不信者便當墮泥犁中正使信佛語者便復來承事我布施我我不喜煩擾於人以是故問耳比丘辭去呵雕阿那鋡言想朝來未食且留飲食便行澡水下飯食訖比丘還白佛言屬至呵雕阿那鋡舍道說言佛坐中大相稱譽呵雕阿那鋡因問我言佛稱譽我時邊有白衣無我言無白衣正使有白衣有何等嫌疑呵雕阿那鋡言佛稱譽我實至誠不妄白衣不信佛語者便當墮泥犁中正使信者便復來承事我我不喜煩擾他人以是故問耳佛言善哉善哉我不常為汝曹說呵雕阿那鋡有七事今復益一事為八事何等為八事一者不求不欲令人知二者信不欲令人知三者自羞不欲令人知四者自慚不欲令人知五者精進不欲令人知六者自觀不欲令人知七者得禪不欲令人知八者黠慧不欲令人知所以不欲令人知者不欲煩擾於人故不欲令人知佛說經已諸比丘皆大歡喜起前為佛作禮
